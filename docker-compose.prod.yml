# Production overlay: builds the frontend to call the API at the same
# origin (empty VITE_API_URL), so nginx can route /api/* to the backend and
# everything else to the frontend from one public domain/port.
#
# Loopback-only port binding lives in docker-compose.yml itself (not here) —
# ports are a list field, and Compose APPENDS overridden list entries rather
# than replacing them when values differ between files, so splitting the
# bind config across two files silently doubled up the port mappings. One
# source of truth avoids that entirely.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  frontend:
    build:
      args:
        VITE_API_URL: ""
